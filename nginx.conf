# ═══════════════════════════════════════════════════════════════
#  Nginx Configuration — TaskFlow Task Manager API
#  Place this at: /etc/nginx/sites-available/task-manager
#  Then: sudo ln -s /etc/nginx/sites-available/task-manager /etc/nginx/sites-enabled/
#  Domain: vivekapp.duckdns.org
#
#  ⚠️  This is the HTTP-only config. Deploy this FIRST.
#      After running: sudo certbot --nginx -d vivekapp.duckdns.org
#      Certbot will automatically add the HTTPS block below.
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name vivekapp.duckdns.org;

    # Let's Encrypt ACME challenge (required for Certbot to verify domain)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Proxy to Node.js App ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Health Check endpoint ──────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }

    # ── Static Files Caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}

# ══════════════════════════════════════════════════════════════════
# After certbot runs successfully, it will automatically insert
# the HTTPS server block here. You do NOT need to add it manually.
# ══════════════════════════════════════════════════════════════════
