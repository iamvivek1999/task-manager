# ═══════════════════════════════════════════════════════════════
#  Nginx Configuration — TaskFlow Task Manager API
#  Place this at: /etc/nginx/sites-available/task-manager
#  Then: sudo ln -s /etc/nginx/sites-available/task-manager /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════

# Upstream block — round-robin load balancing between 2 EC2 instances
upstream taskflow_backend {
    # EC2 Instance 1 (primary)
    server 127.0.0.1:3000;
    # On the Load Balancer / secondary server, uncomment below:
    # server <EC2_INSTANCE_2_PRIVATE_IP>:3000 backup;

    keepalive 32;
}

# ── HTTP Server (ALB Targets this) ─────────────────────────────
server {
    listen 80;
    server_name hello-alb-1417724341.ap-south-1.elb.amazonaws.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Proxy to Node.js App ───────────────────────────────────
    location / {
        proxy_pass         http://taskflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Health Check endpoint (direct, no proxy log spam) ──────
    location /health {
        proxy_pass http://taskflow_backend/health;
        access_log off;
    }

    # ── Static Files Caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://taskflow_backend;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}

