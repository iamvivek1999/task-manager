# ═══════════════════════════════════════════════════════════════
#  Nginx Configuration — TaskFlow Task Manager API
#  Place this at: /etc/nginx/sites-available/task-manager
#  Then: sudo ln -s /etc/nginx/sites-available/task-manager /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════

# Upstream block — round-robin load balancing between 2 EC2 instances
upstream taskflow_backend {
    # EC2 Instance 1 (primary)
    server 127.0.0.1:3000;
    # On the Load Balancer / secondary server, uncomment below:
    # server <EC2_INSTANCE_2_PRIVATE_IP>:3000 backup;

    keepalive 32;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────────────
server {
    listen 80;
    server_name yourname.signiance.com;

    # Let's Encrypt ACME challenge (do not redirect this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourname.signiance.com;

    # ── SSL Certificates (Let's Encrypt) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourname.signiance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourname.signiance.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourname.signiance.com/chain.pem;

    # ── SSL Hardening ──────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # ── Gzip Compression ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # ── Proxy to Node.js App ───────────────────────────────────
    location / {
        proxy_pass         http://taskflow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Health Check endpoint (direct, no proxy log spam) ──────
    location /health {
        proxy_pass http://taskflow_backend/health;
        access_log off;
    }

    # ── Static Files Caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://taskflow_backend;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
